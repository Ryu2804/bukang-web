name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_OWNER: ${{ secrets.HF_SPACE_OWNER }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          python -c '
          import os
          from huggingface_hub import HfApi

          readme_content = """---
          title: Bukang Backend
          emoji: 🚀
          colorFrom: blue
          colorTo: green
          sdk: docker
          pinned: false
          app_port: 7860
          ---
          """
          # Strip leading indentation
          readme_content = "\n".join(line.lstrip() for line in readme_content.strip().split("\n"))

          with open("backend/README.md", "w") as f:
              f.write(readme_content)

          token = os.environ.get("HF_TOKEN")
          owner = os.environ.get("HF_SPACE_OWNER")
          name = os.environ.get("HF_SPACE_NAME")

          if not token or not owner or not name:
              raise ValueError("HF_TOKEN, HF_SPACE_OWNER, and HF_SPACE_NAME secrets must be set.")

          space_id = f"{owner}/{name}"
          api = HfApi(token=token)

          print(f"Uploading backend folder to Space: {space_id}")
          api.upload_folder(
              folder_path="backend",
              repo_id=space_id,
              repo_type="space",
              ignore_patterns=[".venv/*", ".pytest_cache/*", "__pycache__/*", "*.db", "*.pyc", "tests/*", "uploads/*"],
              delete_patterns=["*"]
          )
          print("Deployment successful!")
          '

name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          SPACE="${{ secrets.HF_SPACE_OWNER }}/${{ secrets.HF_SPACE_NAME }}"
          git clone --depth=1 "https://user:${HF_TOKEN}@huggingface.co/spaces/${SPACE}" space-repo
          rm -rf space-repo/*
          cp -r backend/* space-repo/
          cat > space-repo/README.md << 'EOF'
---
title: Bukang Backend
emoji: 🚀
colorFrom: blue
colorTo: green
sdk: docker
pinned: false
app_port: 7860
---
EOF
          cd space-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy ${{ github.sha }}"
          git push
